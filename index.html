<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sunday Puzzle 🧩</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Comic Neue', cursive;
    text-align: center;
    background: url('stars.jpg') no-repeat center center fixed; /* star/nature background */
    background-size: cover;
    color: #003366;
    padding: 40px;
}

h1, h2 {
    color: #0059b3;
}

img {
    max-width: 90%;
    height: auto;
    border-radius: 10px;
    margin-top: 20px;
    border: 2px solid #0059b3;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
    background: linear-gradient(to right, #3399ff, #66ccff);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.05);
}

#question, #birthday, #result {
    display: none;
    margin-top: 30px;
}

input {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #3399ff;
    text-align: center;
}

.emoji-button {
    font-size: 50px;
    cursor: pointer;
    transition: transform 0.2s;
    display: inline-block;
}

.emoji-button:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<h1>Sunday Puzzle 🧩</h1>
<p>Solve the crossword first!</p>
<img src="crossword.png" alt="Crossword Puzzle">

<br>
<button onclick="showQuestion()">I completed the crossword</button>

<div id="question">
<h2>Final Question</h2>
<p>From all the retreat, what will be Laura’s favorite part?</p>
<input id="answer" placeholder="your answer">
<br><br>
<button onclick="checkAnswer()">Submit</button>
</div>

<div id="birthday">
<h2>Ok but it’s your birthday!</h2>
<p>Back to you — <span class="emoji-button" onclick="showResult()">click here → 🎁🐖</span></p>
</div>

<div id="result">
<h2>Destination Revealed! 🎉</h2>
<p>Your adventure awaits:</p>
<h1>Pigs & Pillows 🐖🌿</h1>
<img src="destination.jpg" alt="Pigs & Pillows">
<p>Pack your towel and enjoy the day!</p>
</div>

<script>
function showQuestion() {
    document.getElementById("question").style.display = "block";
}

function checkAnswer() {
    let answer = document.getElementById("answer").value.toLowerCase().trim();
    if(answer === "animals") {
        document.getElementById("question").style.display = "none";
        document.getElementById("birthday").style.display = "block";
    } else {
        alert("Not quite! Try again 😏");
    }
}

function showResult() {
    document.getElementById("birthday").style.display = "none";
    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
